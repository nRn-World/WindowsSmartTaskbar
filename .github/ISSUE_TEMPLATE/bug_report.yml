name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you did and what happened...
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: Provide a list of steps to reproduce the behavior.
      placeholder: |
        1. Open Windows Smart Taskbar
        2. Drag an application...
        3. ...
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Windows Version
      description: e.g. Windows 11 Home 22H2
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (e.g. screenshots).
